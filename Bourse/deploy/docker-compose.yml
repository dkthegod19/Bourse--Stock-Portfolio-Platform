# One command to run the whole platform: `docker compose -f deploy/docker-compose.yml up --build`
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bourse
      POSTGRES_PASSWORD: bourse
      POSTGRES_DB: bourse
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bourse"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Runs migrations once, then exits.
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://bourse:bourse@postgres:5432/bourse?sslmode=disable
    entrypoint: ["sh", "-c", "psql \"$$DATABASE_URL\" -f /app/migrations/0001_init.sql"]

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://bourse:bourse@postgres:5432/bourse?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MARKETDATA_PROVIDER: ${MARKETDATA_PROVIDER:-stub}
      MARKETDATA_API_KEY: ${MARKETDATA_API_KEY:-}
    command: ["/app/api"]
    ports:
      - "8080:8080"

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://bourse:bourse@postgres:5432/bourse?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MARKETDATA_PROVIDER: ${MARKETDATA_PROVIDER:-stub}
      MARKETDATA_API_KEY: ${MARKETDATA_API_KEY:-}
    command: ["/app/worker"]

volumes:
  pgdata:
